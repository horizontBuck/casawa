<section class="dashboard-section pt-80 pb-80">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="text-center mb-5">
                    <h1 class="display-4 fw-bold text-dark">Dashboard</h1>
                    <p class="lead text-muted">Manage your portfolio and services</p>
                </div>
                <div class="row g-4">
                    <div class="col-md-4">
                        <div class="card h-100 shadow-sm border-0" style="background: linear-gradient(135deg, #da743f, #ff7f50);">
                            <div class="card-body text-center text-white">
                                <i class="fas fa-images fa-3x mb-3"></i>
                                <h5 class="card-title">Portfolio</h5>
                                <p class="card-text">Upload and manage your project images and videos</p>
                                <a routerLink="/portfolioDashboard" class="btn btn-light">Go to Portfolio</a>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card h-100 shadow-sm border-0" style="background: linear-gradient(135deg, #20c997, #17a2b8);">
                            <div class="card-body text-center text-white">
                                <i class="fas fa-tools fa-3x mb-3"></i>
                                <h5 class="card-title">Services</h5>
                                <p class="card-text">Manage your services and offerings</p>
                                <a routerLink="/servicesDashboard" class="btn btn-light">Go to Services</a>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card h-100 shadow-sm border-0" style="background: linear-gradient(135deg, #6f42c1, #e83e8c);">
                            <div class="card-body text-center text-white">
                                <i class="fas fa-info-circle fa-3x mb-3"></i>
                                <h5 class="card-title">About</h5>
                                <p class="card-text">Update your about information</p>
                                <a routerLink="/aboutDashboard" class="btn btn-light">Go to About</a>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="row mt-4">
                    <div class="col-12 text-center">
                        <button (click)="logout()" class="btn btn-outline-danger btn-lg">
                            <i class="fas fa-sign-out-alt me-2"></i>Logout
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
